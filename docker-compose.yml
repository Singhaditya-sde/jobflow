version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobflow-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: jobflow
      POSTGRES_PASSWORD: jobflow
      POSTGRES_DB: jobflow

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobflow -d jobflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: